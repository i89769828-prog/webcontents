<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>설문지</title>
</head>
<body>
    <header>
    <h1>설문지</h1><br><br>
    <h3>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</h3>
    <hr>
    </header>
    <section>
        <form>
            <article>    
                <label>학년</label>
                <label><input type="radio" name="grade" value="1">1학년</label>
                <label><input type="radio" name="grade" value="2">2학년</label>
                <label><input type="radio" name="grade" value="3">3학년</label><br>
            </article>
            <article>
                <label>성별</label>
                <label><input type="radio" name="gender" value="m">남자</label>
                <label><input type="radio" name="gender" value="f">여자</label><br>
            </article>
            <article>
                <label>관심 분야</label>
                <label><select name="interest">
                <option value="web">모바일 소프트웨어</option>
                <option value="app" selected>웹 소프트웨어</option>
                <option value="game">게임 소프트웨어</option>    
            </select></label></article><br>
            <article>
                <label>진로   게임<input type="checkbox" value="1">
                기획<input type="checkbox" value="2">
                영업<input type="checkbox" value="3">
                창업<input type="checkbox" value="4"></label></article><br>
            <article>
                <label>남기고 싶은 말<textarea cols="30" rows="15" placeholder="이곳에 작성"></textarea></label>
            </article>
        </form>
    </section>
</body>
</html>
